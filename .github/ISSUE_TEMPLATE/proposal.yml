name: Proposal
description: Suggest a scoped Fractals change.
title: "[Proposal]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: maintenance
    attributes:
      label: Scope and maintenance cost
      description: Compatibility, support, testing, hosted-site, or OpenCode integration impact.
    validations:
      required: true
